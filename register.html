<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | WorkFolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="auth.js"></script>
</head>
<body>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <nav class="glass-nav" style="position: absolute; top: 20px; width: auto; padding: 10px 25px;">
        <a href="index.html" class="logo" style="font-size: 1.2rem;">
            <i class="fas fa-arrow-left" style="color: var(--primary);"></i>
            <span>Back to Home</span>
        </a>
    </nav>

    <div class="auth-wrapper">
        <div class="glass-panel auth-box">
            
            <div class="auth-header">
                <h2>Join <span class="text-gradient">WorkFolio</span></h2>
                <p style="color: var(--text-light);">Start building your professional future today.</p>
            </div>

            <form id="registerForm" onsubmit="processRegister(event)">
                
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regUsername" placeholder="Choose a unique username" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="text" id="regContact" placeholder="Email or Phone" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="Password (Min 6 characters)" minlength="6" required>
                    <i class="fas fa-eye" id="toggleRegEye1" onclick="toggleRegEye('regPassword', 'toggleRegEye1')" style="position: absolute; right: 20px; left: auto; z-index: 10; cursor: pointer; color: var(--text-light);"></i>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regConfirm" placeholder="Re-enter password" minlength="6" required>
                    <i class="fas fa-eye" id="toggleRegEye2" onclick="toggleRegEye('regConfirm', 'toggleRegEye2')" style="position: absolute; right: 20px; left: auto; z-index: 10; cursor: pointer; color: var(--text-light);"></i>
                </div>

                <button type="submit" class="btn-gradient" style="width: 100%; border: none; padding: 15px; border-radius: 16px; font-size: 1.1rem; cursor: pointer; margin-top: 10px;">Create Account</button>
                
            </form>

            <div class="toggle-text">
                Already have an account? <span onclick="window.location.href='login.html'">Sign In</span>
            </div>
            
        </div>
    </div>

    <script>
        // 1. Handle Form Submission
        function processRegister(event) {
            event.preventDefault(); // Stop page refresh
            
            const user = document.getElementById('regUsername').value;
            const contact = document.getElementById('regContact').value;
            const pass = document.getElementById('regPassword').value;
            const confirmPass = document.getElementById('regConfirm').value;

            // Check if passwords match
            if (pass !== confirmPass) {
                alert("❌ Passwords do not match!");
                return;
            }

            // Send to database checker in auth.js
            const result = registerUser(user, contact, pass);
            
            if (result.success) {
                alert("✅ " + result.message + " You can now sign in.");
                window.location.href = 'login.html'; // Send to login page
            } else {
                alert("❌ " + result.message);
            }
        }

        // 2. Handle Eye Icons
        function toggleRegEye(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
    </script>
</body>
</html>
