<!DOCTYPE html>

<head>

<body>

    <nav class="navbar" style="position: relative; z-index: 10;">

    <div class="page-container section-padding" style="position: relative; z-index: 10; background: transparent; box-shadow: none; padding-top: 20px;">
        
        <div class="page-header" style="margin-bottom: 40px; text-align: center;">
            <h1 style="font-size: 3rem; margin-bottom: 10px; color: var(--text-dark); font-weight: 800;">Get in <span class="text-gradient">Touch</span>.</h1>
            <p style="color: #64748b; font-size: 1.1rem;">Fill out the form below and our team will get back to you.</p>
        </div>

        <div class="contact-card glass-panel" style="background: rgba(255, 255, 255, 0.65); max-width: 700px; margin: 0 auto 60px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.8);">
            
            <form class="contact-form" id="contactForm" onsubmit="sendEmail(event)">
                
                <input type="hidden" name="access_key" value="f33d1bd1-2480-4a4d-b626-41257b1341fa">
                
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="font-weight: 600; color: #1e293b; display: block; margin-bottom: 8px;">Full Name</label>
                    <input type="text" name="name" placeholder="John Doe" required style="width: 100%; padding: 15px; border: 1px solid rgba(139, 92, 246, 0.4); background: rgba(255, 255, 255, 0.9); border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; color: #334155;">
                </div>
                
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="font-weight: 600; color: #1e293b; display: block; margin-bottom: 8px;">Email Address</label>
                    <input type="email" name="email" placeholder="john@example.com" required style="width: 100%; padding: 15px; border: 1px solid rgba(139, 92, 246, 0.4); background: rgba(255, 255, 255, 0.9); border-radius: 12px; font-size: 1rem; outline: none; color: #334155;">
                </div>
                
                <div class="form-group" style="margin-bottom: 30px;">
                    <label style="font-weight: 600; color: #1e293b; display: block; margin-bottom: 8px;">Message</label>
                    <textarea name="message" rows="5" placeholder="How can we help you?" required style="width: 100%; padding: 15px; border: 1px solid rgba(139, 92, 246, 0.4); background: rgba(255, 255, 255, 0.9); border-radius: 12px; font-size: 1rem; outline: none; font-family: inherit; resize: vertical; color: #334155;"></textarea>
                </div>
                
                <button type="submit" id="submitBtn" class="btn-gradient" style="width: 100%; padding: 15px; font-size: 1.1rem; border-radius: 12px; border: none; cursor: pointer; color: white; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3); font-weight: 600;">
                    <i class="fas fa-paper-plane" style="margin-right: 8px;"></i> Send Message
                </button>
                
                <div id="result" style="text-align: center; margin-top: 15px; font-weight: bold;"></div>
            </form>
        </div>

       <div class="info-bar" style="max-width: 900px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; padding: 0 15px;">
            
            <div class="info-card glass-panel" style="background: rgba(255, 255, 255, 0.65); padding: 20px 30px; border-radius: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.8); flex: 1; min-width: 250px;">
                <div class="icon-circle" style="width: 50px; height: 50px; min-width: 50px; background: rgba(59, 130, 246, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #3b82f6; font-size: 1.2rem;">
                    <i class="fas fa-envelope"></i>
                </div>
                <div>
                    <p style="font-size: 0.8rem; color: #64748b; margin: 0 0 4px 0; text-transform: uppercase; font-weight: bold;">Email Us</p>
                    <strong style="color: #1e293b; font-size: 1rem; word-break: break-word;">support@workfolio.com</strong>
                </div>
            </div>

            <div class="info-card glass-panel" style="background: rgba(255, 255, 255, 0.65); padding: 20px 30px; border-radius: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.8); flex: 1; min-width: 250px;">
                <div class="icon-circle" style="width: 50px; height: 50px; min-width: 50px; background: rgba(16, 185, 129, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #10b981; font-size: 1.2rem;">
                    <i class="fas fa-phone-alt"></i>
                </div>
                <div>
                    <p style="font-size: 0.8rem; color: #64748b; margin: 0 0 4px 0; text-transform: uppercase; font-weight: bold;">Call Us</p>
                    <strong style="color: #1e293b; font-size: 0.95rem;">+91 8008083932 <br> +91 9182266004</strong>
                </div>
            </div>

            <div class="info-card glass-panel" style="background: rgba(255, 255, 255, 0.65); padding: 20px 30px; border-radius: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.8); flex: 1; min-width: 250px;">
                <div class="icon-circle" style="width: 50px; height: 50px; min-width: 50px; background: rgba(168, 85, 247, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #a855f7; font-size: 1.2rem;">
                    <i class="fas fa-map-marker-alt"></i>
                </div>
                <div>
                    <p style="font-size: 0.8rem; color: #64748b; margin: 0 0 4px 0; text-transform: uppercase; font-weight: bold;">Location</p>
                    <strong style="color: #1e293b; font-size: 0.95rem;">Main City, White Town,<br>Puducherry, 605001</strong>
                </div>
            </div>

        </div>
    </div>
    
    <footer class="dashboard-footer" style="margin-top: 60px; position: relative; z-index: 10;">
        <p class="copyright" style="color: #64748b;">&copy; 2026 WorkFolio Suite. All rights reserved.</p>
    </footer>
    
    <script src="auth.js"></script>

    <script>
        function sendEmail(e) {
            e.preventDefault(); 
            
            const form = document.getElementById('contactForm');
            const result = document.getElementById('result');
            const submitBtn = document.getElementById('submitBtn');

            // Save to your local Admin Panel
            try {
                const name = document.querySelector('input[name="name"]').value;
                const email = document.querySelector('input[name="email"]').value;
                const msg = document.querySelector('textarea[name="message"]').value;
                if(typeof saveMessage === 'function') {
                    saveMessage(name, email, msg);
                }
            } catch(err) { console.log("Local save skipped."); }

            // Prepare data for Web3Forms
            const formData = new FormData(form);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            result.innerHTML = "Sending...";
            result.style.color = "#64748b";
            submitBtn.innerHTML = "<i class='fas fa-spinner fa-spin' style='margin-right: 8px;'></i> Sending...";

            // Send the actual email
            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: json
            })
            .then(async (response) => {
                let jsonResult = await response.json();
                if (response.status == 200) {
                    result.innerHTML = "Message Sent Successfully!";
                    result.style.color = "#10b981"; // Success green
                    submitBtn.innerHTML = "<i class='fas fa-check' style='margin-right: 8px;'></i> Sent";
                    form.reset(); 
                    
                    // Reset button after 3 seconds
                    setTimeout(() => {
                        submitBtn.innerHTML = "<i class='fas fa-paper-plane' style='margin-right: 8px;'></i> Send Message";
                        result.innerHTML = "";
                    }, 3000);
                } else {
                    console.log(response);
                    result.innerHTML = jsonResult.message;
                    result.style.color = "#ef4444"; // Error red
                    submitBtn.innerHTML = "<i class='fas fa-paper-plane' style='margin-right: 8px;'></i> Send Message";
                }
            })
            .catch(error => {
                console.log(error);
                result.innerHTML = "Something went wrong! Please try again.";
                result.style.color = "#ef4444";
                submitBtn.innerHTML = "<i class='fas fa-paper-plane' style='margin-right: 8px;'></i> Send Message";
            });
        }
    </script>

</body>
</html>
